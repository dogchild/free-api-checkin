name: Daily Check-in

on:
  workflow_dispatch:
  schedule:
    # 00:30 Asia/Shanghai = 16:30 UTC on the previous day.
    - cron: '30 16 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily check-in
        env:
          CHECKIN_ENABLED: ${{ secrets.CHECKIN_ENABLED }}
          ICE_SUB2API_AUTH_TOKEN: ${{ secrets.ICE_SUB2API_AUTH_TOKEN }}
          ICE_SUB2API_USER_ID: ${{ secrets.ICE_SUB2API_USER_ID }}
          ELYSIVER_COOKIE: ${{ secrets.ELYSIVER_COOKIE }}
          ELYSIVER_USER_ID: ${{ secrets.ELYSIVER_USER_ID }}
          # Add provider-specific secrets here when real site integrations are implemented.
          # EXAMPLE_COOKIE: ${{ secrets.EXAMPLE_COOKIE }}
          # EXAMPLE_TOKEN: ${{ secrets.EXAMPLE_TOKEN }}
        run: npm run checkin
